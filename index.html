<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yunjin Reverie — A Fleeting Illusion</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="museum-opening">
    <!-- Fixed visual stage -->
    <section class="stage">
      <div class="mist mist-a"></div>
      <div class="mist mist-b"></div>
      <div class="mist mist-c"></div>

      <div class="light-wash"></div>
      <div class="water-reflection"></div>

      <!-- Scene 2: memory fragments -->
      <div class="fragment fragment-eave"></div>
      <div class="fragment fragment-window"></div>
      <div class="fragment fragment-tree"></div>
      <div class="fragment fragment-water"></div>

      <!-- Scene 3: threads -->
      <svg class="threads" viewBox="0 0 1440 900" preserveAspectRatio="none" aria-hidden="true">
        <path class="thread thread-1" d="M-80,570 C220,510 360,380 610,430 C860,480 940,270 1220,310 C1350,330 1470,250 1560,220" />
        <path class="thread thread-2" d="M-50,660 C210,610 380,640 560,540 C760,430 890,450 1060,560 C1210,660 1390,590 1510,500" />
        <path class="thread thread-3" d="M120,90 C260,230 420,260 590,190 C810,100 1020,130 1190,260 C1310,350 1400,380 1530,340" />
        <path class="thread thread-4" d="M10,760 C220,720 390,680 590,710 C790,740 930,810 1160,760 C1320,720 1430,650 1530,620" />
      </svg>

      <!-- Scene 4: fabric revelation -->
      <div class="fabric-plane">
        <div class="fabric-pattern"></div>
      </div>

      <!-- Scene 5: awakening / final title -->
      <div class="dress-silhouette">
        <div class="dress-core"></div>
      </div>

      <div class="intro-copy">
        <p class="eyebrow">A dream woven in silk</p>
        <h1>Yunjin Reverie</h1>
        <p class="subtitle">A Fleeting Illusion</p>
      </div>

      <div class="scroll-hint">Scroll to awaken</div>
    </section>

    <!-- Invisible scroll area: creates progress without showing normal sections -->
    <section class="scroll-space" aria-hidden="true"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
